name: jarvis_ai
description: J.A.R.V.I.S - AI Voice Assistant inspired by Iron Man
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  http: ^1.2.1
  animate_do: ^3.3.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  google_fonts: ^6.2.1
  provider: ^6.1.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
